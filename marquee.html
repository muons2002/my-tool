<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* جعل الخلفية شفافة تماماً لتظهر خلفية صفحتك الأصلية */
        body { 
            background: transparent; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Courier New', monospace; 
        }

        .marquee-box { 
            width: 90%; 
            overflow: hidden; 
            background: rgba(0, 0, 0, 0.5); /* خلفية داكنة شبه شفافة */
            border: 1px solid #00d4ff; 
            border-radius: 10px;
            padding: 10px 0; 
        }

        .marquee-text { 
            display: inline-block; 
            white-space: nowrap; 
            animation: move-right 10s linear infinite; 
            color: #00d4ff; 
            font-size: 1.2rem; 
            font-weight: 800;
        }

        @keyframes move-right { 
            from { transform: translateX(-100%); } 
            to { transform: translateX(100%); } 
        }
    </style>
</head>
<body>

    <div class="marquee-box">
        <div class="marquee-text">
            --- جنود الخفاء - حب الخير للغير - تحديثات البث مستمرة - كن دائماً معنا ---
        </div>
    </div>

</body>
</html>
