<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إذاعة القرآن الكريم</title>
    <style>
        body { 
            background: #0f171e; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        
        .card { 
            background: #1a2936; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 80%; 
            max-width: 500px; 
        }
        
        .group-tag { 
            color: #4fc3f7; 
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 30px; 
        }
        
        audio { 
            width: 100%; 
            margin-bottom: 20px;
        }

        .footer-note {
            color: #819ca9;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- تم الحذف بناءً على طلبك -->
        
        <div class="group-tag">جنود الخفاء - حب الخير للغير</div>
        
        <audio controls autoplay>
            <source src="https://stream.radiojar.com/8s5u5tpdtwzuv" type="audio/mpeg">
        </audio>
        
        <div class="footer-note">اللهم اجعله في ميزان حسناتكم</div>
    </div>

</body>
</html>
