<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل جنود الخفاء</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #0f172a; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .tool-box { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; box-sizing: border-box; }
        button { background: #f43f5e; border: none; font-weight: bold; cursor: pointer; }
        #playerArea { display: none; flex-direction: column; }
        .player-layout { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 10px; }
        #channelList { flex: 1; height: 350px; background: #0f172a; color: #fff; border: 1px solid #334155; }
        #videoPlayer { flex: 2; height: 350px; background: #000; border: 2px solid #f43f5e; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container"><div class="tool-box">
    <div id="loginArea">
        <h3>📺 مشغل جنود الخفاء (جاري الاتصال...)</h3>
        <input type="text" id="host" value="http://93.157.106.66:7000" placeholder="الهوست">
        <input type="text" id="user" value="hassan.essaadi" placeholder="اليوزر">
        <input type="text" id="pass" value="REERSTRS5545" placeholder="الباسورد">
        <button onclick="loginAndFetch()">إعادة محاولة الاتصال</button>
    </div>
    <div id="playerArea">
        <button onclick="location.reload()" style="background:#475569;">⬅ خروج وتغيير</button>
        <div class="player-layout">
            <select id="channelList" size="10" onchange="playSelected(this.value)"></select>
            <video id="videoPlayer" controls></video>
        </div>
    </div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const PROXY = "https://cors-anywhere.herokuapp.com/";
    // تنفيذ تلقائي
    window.onload = loginAndFetch;

    async function loginAndFetch() {
        const host = document.getElementById('host').value.replace(/\/$/, "");
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        try {
            const res = await fetch(`${PROXY}${host}/player_api.php?username=${u}&password=${p}&action=get_live_streams`);
            const data = await res.json();
            const select = document.getElementById('channelList');
            select.innerHTML = '';
            data.forEach(s => {
                let opt = document.createElement('option');
                opt.value = `${host}/live/${u}/${p}/${s.stream_id}.m3u8`;
                opt.text = s.name;
                select.appendChild(opt);
            });
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('playerArea').style.display = 'flex';
        } catch(e) { console.log("جاري المحاولة..."); }
    }
    
    function playSelected(url) {
        let video = document.getElementById('videoPlayer');
        let hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    }
</script>
</body>
</html>
