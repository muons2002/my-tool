<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل جنود الخفاء</title>
    <style>
        body { font-family: Tahoma; background-color: #0f172a; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        .tool-box { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; box-sizing: border-box; }
        button { background: #f43f5e; border: none; font-weight: bold; cursor: pointer; }
        #playerArea { display: none; flex-direction: column; }
    </style>
</head>
<body>

<div class="container"><div class="tool-box">
    <div id="loginArea">
        <h3>📺 مشغل جنود الخفاء</h3>
        <input type="text" id="host" value="http://markcode.online:8080" placeholder="الهوست">
        <input type="text" id="user" value="6350661378" placeholder="اليوزر">
        <input type="text" id="pass" value="24848524267731dd74a135" placeholder="الباسورد">
        <button onclick="loginAndFetch()">دخول</button>
    </div>
    <div id="playerArea">
        <button onclick="location.reload()" style="background:#475569;">⬅ خروج</button>
        <select id="channelList" size="10" onchange="playSelected(this.value)"></select>
        <video id="videoPlayer" controls style="width:100%; margin-top:10px;"></video>
    </div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    async function loginAndFetch() {
        const host = document.getElementById('host').value;
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        // الاتصال المباشر بدون Proxy (هيجرب الاتصال مباشرة)
        try {
            const res = await fetch(`${host}/player_api.php?username=${u}&password=${p}&action=get_live_streams`);
            const data = await res.json();
            const select = document.getElementById('channelList');
            data.forEach(s => {
                let opt = document.createElement('option');
                opt.value = `${host}/live/${u}/${p}/${s.stream_id}.m3u8`;
                opt.text = s.name;
                select.appendChild(opt);
            });
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('playerArea').style.display = 'flex';
        } catch(e) { 
            alert("فشل الاتصال! جرب تشغيل VPN أو تأكد من الهوست."); 
        }
    }
    
    function playSelected(url) {
        let video = document.getElementById('videoPlayer');
        let hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    }
</script>
</body>
</html>
